# Configuración de la aplicación Nimbus Example
# Usadas con @Value("${clave}") o @Value("${clave:default}")

app.name=Nimbus Example
app.version=1.0.0
app.env=development

# Seguridad — clave usada por AuthInterceptor
auth.api-key=nimbus-secret-2024

# Límites de negocio
curso.max-duracion=200
curso.min-duracion=1

# DataSource H2 en memoria — demo de JdbcTemplate/NamedParameterJdbcTemplate (com.example.dao).
# INIT=RUNSCRIPT ejecuta schema.sql en cada conexión (idempotente) ya que
# DriverManagerDataSource no usa pool — ver beans-config.xml para la alternativa JNDI.
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:nimbusdb;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
db.user=sa
db.password=
